stages:
  # - s-instalar solo NPM
  - s-construir
  - s-sonar
  - s-pruebas-unitarias
  # - s-version es manual
  - s-desplegar # solo java

variables:
  FF_USE_FASTZIP: "true"
  GIT_DEPTH: 5
  GIT_CLEAN_FLAGS: none

before_script:
  - env
  - rm -rf build

# ===============================================
# workflow
# ===============================================
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "main"
      when: never
    - when: always

# ===============================================
# validar calidad en mr
# ===============================================
construir:
  stage: s-construir
  tags:
    - java11
  script:
    - ./gradlew clean build
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

sonar-qube-mr:
  stage: s-sonar
  tags:
    - java11
  script:
    - sh versionador/version_control.sh mr $CI_PIPELINE_ID
    - ./gradlew clean sonarqube
  after_script:
    - git checkout -- gradle.properties
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

pruebas-unitarias:
  stage: s-pruebas-unitarias
  tags:
    - java11
  script:
    - ./gradlew clean build test jacocoTestReport
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

# ===============================================
# ejecutar sonar en ramas de desarrollo
# ===============================================
sonar-qube-dev:
  stage: s-sonar
  tags:
    - java11
  script:
    - sh versionador/version_control.sh dev $CI_PIPELINE_ID
    - ./gradlew clean sonarqube
  after_script:
    - git checkout -- gradle.properties
  rules:
    - if: $CI_COMMIT_MESSAGE =~ (/^ \[Gradle Release Plugin].*/ || /^\[Gradle Release Plugin].*/) || $CI_COMMIT_MESSAGE =~ /^Siguiente versión:.*/
      when: never
    - if: $CI_COMMIT_REF_NAME =~ /^(feature|fix|hotfix|patch|minor|major)(-).*/ && $CI_PIPELINE_SOURCE == 'push'
      when: manual

# ===============================================
# desplegar version
# ===============================================
desplegar:
  stage: s-desplegar
  tags:
    - java11
  script:
    - ./gradlew clean build publish
  rules:
    - if: $CI_COMMIT_TAG  =~ /^\d+.\d+.\d+/

# ===============================================
# ejecutar sonar en tag
# ===============================================
sonar-qube-tag:
  stage: s-sonar
  tags:
    - java11
  script:
    - ./gradlew clean sonarqube
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+.\d+.\d+/
      when: always
